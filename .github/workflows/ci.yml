# Cross-platform CI: builds and runs the SupXML test suite on
# Linux, macOS, and Windows so platform-specific regressions (e.g.
# `cfg(unix)` paths in entity_resolver.rs) can't sneak through.
#
# `sup-xml-bench` is excluded because it links libxml2 + pugixml via
# FFI through pkg-config, which isn't reliably available on Windows
# runners (and would need vcpkg / a downloaded build to even attempt).
# The bench crate isn't load-bearing for correctness — it's perf
# comparison only — so dropping it from CI keeps the matrix simple.

name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel other platforms when one fails — we want to see
      # the full matrix outcome, not a Linux-only view of a Windows bug.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      # `--all-features` matches the local `cargo test-all` alias so
      # `c-abi` (the libxml2/libxslt ABI shims in `compat`) and the
      # other optional features (`xsd`, `xslt`, `html`, `serde`,
      # `tokio`, `network-resolver`, `full-encodings`) get compiled
      # under `-D warnings` too — otherwise feature-gated code can
      # accumulate warnings the CI gate never sees.
      - name: cargo build
        run: cargo build --workspace --exclude sup-xml-bench --all-features --verbose

      - name: cargo test
        run: cargo test --workspace --exclude sup-xml-bench --all-features -- --test-threads=1 --nocapture

  # The `simdutf8::compat::from_utf8` ⇄ `std::str::from_utf8` equivalence
  # tests (parser.rs) run on every matrix entry above: the x86_64
  # Linux/Windows runners exercise simdutf8's runtime-dispatched AVX2/SSE4.2
  # paths, and the aarch64 macOS runner exercises NEON.  Only the scalar
  # fallback is never selected on real hardware — so this job forces it by
  # disabling NEON at compile time (simdutf8 gates its aarch64 path on
  # `target_feature = "neon"`), pinning the scalar validator against `std`
  # as the oracle too.
  simd-scalar-fallback:
    name: simdutf8 scalar fallback
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: cargo test (NEON disabled → scalar dispatch)
        env:
          # Replaces the workflow-level `-D warnings`; disabling a baseline
          # aarch64 feature would otherwise trip the warnings-as-errors gate.
          RUSTFLAGS: "-C target-feature=-neon"
        run: cargo test -p sup-xml-core --lib simdutf8_matches -- --nocapture
