# Miri runs the SupXML test suite under Rust's MIR interpreter to
# detect undefined behaviour in our unsafe code.  See CONTRIBUTING.md
# § "Unsafe policy" for the policy and rationale.
#
# `sup-xml-bench` is excluded because it links libxml2 via FFI; Miri
# can't interpret native code.

name: miri

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  # Miri's default Stacked Borrows aliasing model — the actual UB detector —
  # stays on with no flag; that's what catches our unsafe code's aliasing
  # and provenance violations.  (We don't need the experimental
  # `-Zmiri-tree-borrows` successor yet.)
  #
  # `-Zmiri-permissive-provenance` (rather than the stricter
  # `-Zmiri-strict-provenance`): a transitive dependency (`tendril`, via
  # `html5ever`) does integer-to-pointer casts for tagged pointers — legal
  # but discouraged.  Strict mode hard-errors on them and aborts the
  # HTML-parsing tests on dependency code we don't control; permissive mode
  # accepts them and silences the per-cast warning, while Stacked Borrows
  # still detects real UB in our own unsafe code.
  #
  # `-Zmiri-disable-isolation` lets real clock / filesystem syscalls reach
  # the host.  The license gate runs on the first parse (`ensure_licensed`)
  # and needs both — `chrono::Utc::now()` for certificate expiry and a
  # `.supso/` directory search — neither permitted under Miri's default
  # isolation.  It does not weaken UB detection; it only allows those calls.
  MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-permissive-provenance"

jobs:
  miri:
    name: cargo miri test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup

      - name: Run Miri on the workspace
        run: cargo miri test --workspace --exclude sup-xml-bench
